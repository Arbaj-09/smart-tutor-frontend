<!DOCTYPE html>
<html>
<head>
    <title>Create Test User</title>
</head>
<body>
    <h1>Create Test HOD User</h1>
    <button onclick="createHOD()">Create Test HOD</button>
    <div id="result"></div>

    <script>
        async function createHOD() {
            try {
                const response = await fetch('http://localhost:8082/auth/register-hod', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'Test HOD',
                        email: 'hod@smarttutor.com',
                        password: 'admin123'
                    })
                });
                
                const result = await response.text();
                document.getElementById('result').innerHTML = `
                    <h3>Create HOD Response:</h3>
                    <pre>${result}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
