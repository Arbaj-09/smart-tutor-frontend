<!-- Global Notification Bell - Top Right -->
<div class="global-notification-bell" id="globalNotificationBell">
    <button class="notification-bell" id="notificationBell" title="Notifications">
        <i class="fas fa-bell"></i>
        <span class="notification-badge" id="notificationBadge">0</span>
    </button>
    
    <!-- Notification Dropdown -->
    <div class="notification-dropdown" id="notificationDropdown">
        <div class="notification-header">
            <h6>Notifications</h6>
            <button class="mark-all-read" id="markAllReadBtn">Mark all read</button>
        </div>
        <div class="notification-list" id="notificationList">
            <div class="no-notifications">
                <i class="fas fa-bell-slash"></i>
                <p>No notifications</p>
            </div>
        </div>
        <div class="notification-footer">
            <a href="#" class="view-all-notifications" data-page="notifications">View all notifications</a>
        </div>
    </div>
</div>
