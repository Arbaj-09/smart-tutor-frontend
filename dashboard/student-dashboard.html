<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - SmartTutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>
    
    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Student Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <button class="btn btn-outline btn-sm" onclick="refreshDashboard()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="viewNotifications()">
                        <i class="fas fa-bell"></i>
                        Notifications
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Stats Cards -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon bg-success">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="attendancePercentage">0%</h3>
                            <p class="stat-label">Attendance %</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon bg-primary">
                            <i class="fas fa-tasks"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="quizProgress">0</h3>
                            <p class="stat-label">Quiz Progress</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon bg-secondary">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="latestScore">0</h3>
                            <p class="stat-label">Latest Score</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon bg-warning">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="availableNotes">0</h3>
                            <p class="stat-label">Available Notes</p>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Quick Actions -->
            <section class="quick-actions-section">
                <div class="section-header">
                    <h2>Quick Actions</h2>
                </div>
                <div class="quick-actions-grid">
                    <button class="quick-action-card" onclick="navigateToNotes()">
                        <div class="action-icon">
                            <i class="fas fa-book"></i>
                        </div>
                        <h3>View Notes</h3>
                        <p>Access study materials</p>
                    </button>
                    
                    <button class="quick-action-card" onclick="navigateToQuiz()">
                        <div class="action-icon">
                            <i class="fas fa-question-circle"></i>
                        </div>
                        <h3>Take Quiz</h3>
                        <p>Test your knowledge</p>
                    </button>
                    
                    <button class="quick-action-card" onclick="navigateToResults()">
                        <div class="action-icon">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <h3>View Results</h3>
                        <p>Check your performance</p>
                    </button>
                    
                    <button class="quick-action-card" onclick="navigateToAttendance()">
                        <div class="action-icon">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <h3>My Attendance</h3>
                        <p>View attendance record</p>
                    </button>
                </div>
            </section>
            
            <!-- Recent Activities -->
            <section class="recent-activities-section">
                <div class="section-header">
                    <h2>Recent Quizzes</h2>
                </div>
                <div class="activities-list" id="recentQuizzes">
                    <!-- Quiz results will be loaded here -->
                </div>
            </section>
        </div>
    </main>
    
    <!-- Modal Container -->
    <div id="modalContainer"></div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar-loader.js"></script>
    <script>
        function showLoading() { const o = document.getElementById('loadingOverlay'); if(o) o.classList.remove('hidden'); }
        function hideLoading() { const o = document.getElementById('loadingOverlay'); if(o) o.classList.add('hidden'); }
        function showToast(msg, type) { if(window.showToast) window.showToast(msg, type); else console.log(type + ': ' + msg); }

        document.addEventListener('DOMContentLoaded', function() {
            const userStr = localStorage.getItem('user');
            if (!userStr) { window.location.href = '/frontend/index.html'; return; }

            let user;
            try { user = JSON.parse(userStr); } catch(e) { window.location.href = '/frontend/index.html'; return; }

            if (!user.role || user.role !== 'STUDENT') {
                window.location.href = '/frontend/index.html';
                return;
            }

            window.loadSidebar();
            loadDashboardData();
        });

        async function loadDashboardData() {
            try {
                showLoading();
                const response = await studentAPI.getDashboardStats();
                if (response) updateStatsCards(response);
            } catch (error) {
                console.error('Dashboard data error:', error);
            } finally {
                hideLoading();
            }
        }

        function updateStatsCards(data) {
            const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
            set('attendancePercentage', (data.attendancePercentage || 0) + '%');
            set('quizProgress', data.quizProgress || 0);
            set('latestScore', data.latestScore || 0);
            set('availableNotes', data.availableNotes || 0);
        }

        function refreshDashboard() { loadDashboardData(); }
        function viewNotifications() { window.location.href = '../pages/notifications.html'; }
        function navigateToNotes() { window.location.href = '../pages/notes.html'; }
        function navigateToQuiz() { window.location.href = '../pages/quiz.html'; }
        function navigateToResults() { window.location.href = '../pages/results.html'; }
        function navigateToAttendance() { window.location.href = '../pages/attendance.html'; }
    </script>
</body>
</html>
