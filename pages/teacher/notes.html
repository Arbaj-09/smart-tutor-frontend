<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes - SmartTutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/main.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/professional.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>
    
    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">My Notes</h1>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <button class="btn btn-outline" onclick="refreshNotes()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                    <button class="btn btn-primary" onclick="showUploadModal()">
                        <i class="fas fa-plus"></i>
                        Upload Notes
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <section class="content">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label for="classFilter">Class</label>
                    <select id="classFilter" class="filter-control form-select">
                        <option value="">All Classes</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="divisionFilter">Division</label>
                    <select id="divisionFilter" class="filter-control form-select">
                        <option value="">All Divisions</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchInput">Search</label>
                    <input type="text" id="searchInput" class="filter-control" placeholder="Search by title or subject...">
                </div>
            </div>

            <!-- Notes Table -->
            <div class="card">
                <div class="card-header">
                    <h3>Uploaded Notes</h3>
                    <div class="card-actions">
                        <span class="text-muted" id="notesCount">Loading...</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table" id="notesTable">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Subject</th>
                                    <th>Class</th>
                                    <th>Division</th>
                                    <th>Uploaded Date</th>
                                    <th>File</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="notesTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">
                                        <div class="loading-spinner">
                                            <i class="fas fa-spinner fa-spin"></i>
                                            Loading notes...
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination -->
                    <div class="pagination-container" id="paginationContainer">
                        <!-- Pagination will be added here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Upload Notes Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Upload Notes</h3>
                <button class="modal-close" onclick="closeUploadModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="uploadForm">
                    <div class="form-group">
                        <label for="classSelect">Class *</label>
                        <select id="classSelect" class="form-control" required>
                            <option value="">Select Class</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="divisionSelect">Division *</label>
                        <select id="divisionSelect" class="form-control" required>
                            <option value="">Select Class First</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="titleInput">Title *</label>
                        <input type="text" id="titleInput" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="subjectInput">Subject *</label>
                        <input type="text" id="subjectInput" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="descriptionInput">Description *</label>
                        <textarea id="descriptionInput" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="fileInput">File *</label>
                        <input type="file" id="fileInput" class="form-control" accept=".pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png" required>
                        <small class="text-muted">Allowed: PDF, DOC, DOCX, PPT, PPTX, JPG, JPEG, PNG (Max 10MB)</small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline" onclick="closeUploadModal()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="uploadNotes()">
                    <i class="fas fa-upload"></i>
                    Upload Notes
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="../../js/sidebar.js"></script>
    <script src="../../js/utils.js"></script>
    <script>
        // Global variables
        let currentTeacherId = 1; // This should come from login/session
        let allNotes = [];
        let filteredNotes = [];
        let currentPage = 1;
        const PAGE_SIZE = 10;
        let classesData = [];
        let divisionsData = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar();
            loadNotes();
            loadTeacherClasses();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('classSelect').addEventListener('change', loadDivisions);
            document.getElementById('classFilter').addEventListener('change', applyFilters);
            document.getElementById('divisionFilter').addEventListener('change', applyFilters);
            document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));
        }

        async function loadNotes() {
            try {
                showLoading();
                const response = await fetch(`http://localhost:8082/api/notes/teacher/${currentTeacherId}`);
                if (!response.ok) throw new Error('Failed to load notes');
                
                allNotes = await response.json();
                applyFiltersAndRender();
                
            } catch (error) {
                console.error('Error loading notes:', error);
                showToast('Error loading notes', 'error');
                renderErrorState();
            } finally {
                hideLoading();
            }
        }

        async function loadTeacherClasses() {
            try {
                const response = await fetch(`http://localhost:8082/api/teachers/${currentTeacherId}/classes`);
                if (!response.ok) throw new Error('Failed to load classes');
                
                classesData = await response.json();
                populateClassSelects();
                
            } catch (error) {
                console.error('Error loading classes:', error);
                showToast('Error loading classes', 'error');
            }
        }

        function populateClassSelects() {
            const classSelect = document.getElementById('classSelect');
            const classFilter = document.getElementById('classFilter');
            
            classSelect.innerHTML = '<option value="">Select Class</option>';
            classFilter.innerHTML = '<option value="">All Classes</option>';
            
            classesData.forEach(cls => {
                classSelect.innerHTML += `<option value="${cls.id}">${cls.className}</option>`;
                classFilter.innerHTML += `<option value="${cls.id}">${cls.className}</option>`;
            });
        }

        async function loadDivisions() {
            const classId = document.getElementById('classSelect').value;
            const divisionSelect = document.getElementById('divisionSelect');
            
            if (!classId) {
                divisionSelect.innerHTML = '<option value="">Select Class First</option>';
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8082/api/teachers/${currentTeacherId}/divisions?classId=${classId}`);
                if (!response.ok) throw new Error('Failed to load divisions');
                
                divisionsData = await response.json();
                divisionSelect.innerHTML = '<option value="">Select Division</option>';
                divisionsData.forEach(division => {
                    divisionSelect.innerHTML += `<option value="${division.id}">${division.divisionName}</option>`;
                });
                
            } catch (error) {
                console.error('Error loading divisions:', error);
                showToast('Error loading divisions', 'error');
            }
        }

        function applyFilters() {
            currentPage = 1;
            applyFiltersAndRender();
        }

        function applyFiltersAndRender() {
            const classFilter = document.getElementById('classFilter').value;
            const divisionFilter = document.getElementById('divisionFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // Apply filters
            filteredNotes = allNotes.filter(note => {
                const matchesClass = !classFilter || note.classEntity?.id == classFilter;
                const matchesDivision = !divisionFilter || note.division?.id == divisionFilter;
                const matchesSearch = !searchTerm || 
                    note.title.toLowerCase().includes(searchTerm) ||
                    note.subject.toLowerCase().includes(searchTerm);
                
                return matchesClass && matchesDivision && matchesSearch;
            });
            
            renderNotesTable();
            updatePagination();
        }

        function renderNotesTable() {
            const tbody = document.getElementById('notesTableBody');
            const total = filteredNotes.length;
            const start = (currentPage - 1) * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, total);
            const pageData = filteredNotes.slice(start, end);
            
            if (total === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center text-muted">
                            <i class="fas fa-inbox fa-2x mb-2"></i>
                            <p>No notes found</p>
                        </td>
                    </tr>
                `;
                document.getElementById('notesCount').textContent = '0 notes';
                return;
            }
            
            tbody.innerHTML = pageData.map(note => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <div class="file-icon me-2">
                                <i class="fas fa-file-${getFileIcon(note.fileType)}"></i>
                            </div>
                            <div>
                                <div class="fw-medium">${escapeHtml(note.title)}</div>
                                ${note.description ? `<small class="text-muted">${escapeHtml(note.description)}</small>` : ''}
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge badge-info">${escapeHtml(note.subject)}</span>
                    </td>
                    <td>${note.classEntity ? escapeHtml(note.classEntity.className) : 'Unknown'}</td>
                    <td>${note.division ? escapeHtml(note.division.divisionName) : 'Unknown'}</td>
                    <td>
                        <small>${formatDate(note.uploadedAt)}</small>
                    </td>
                    <td>
                        <div class="d-flex align-items-center">
                            <i class="fas fa-file-${getFileIcon(note.fileType)} me-1"></i>
                            <small>${note.fileName}</small>
                        </div>
                    </td>
                    <td>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline" onclick="downloadNote('${note.filePath}', '${note.fileName}')" title="Download">
                                <i class="fas fa-download"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteNote(${note.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('notesCount').textContent = `${total} note${total !== 1 ? 's' : ''}`;
        }

        function updatePagination() {
            const total = filteredNotes.length;
            const totalPages = Math.ceil(total / PAGE_SIZE);
            const container = document.getElementById('paginationContainer');
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let pagination = '<div class="pagination">';
            
            // Previous button
            pagination += `
                <button class="btn btn-outline ${currentPage === 1 ? 'disabled' : ''}" 
                        onclick="goToPage(${currentPage - 1})" 
                        ${currentPage === 1 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i>
                </button>
            `;
            
            // Page numbers
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }
            
            for (let i = startPage; i <= endPage; i++) {
                pagination += `
                    <button class="btn ${i === currentPage ? 'btn-primary' : 'btn-outline'}" 
                            onclick="goToPage(${i})">
                        ${i}
                    </button>
                `;
            }
            
            // Next button
            pagination += `
                <button class="btn btn-outline ${currentPage === totalPages ? 'disabled' : ''}" 
                        onclick="goToPage(${currentPage + 1})" 
                        ${currentPage === totalPages ? 'disabled' : ''}>
                    <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            pagination += '</div>';
            container.innerHTML = pagination;
        }

        function goToPage(page) {
            currentPage = page;
            renderNotesTable();
            updatePagination();
            document.querySelector('.table-container').scrollIntoView({ behavior: 'smooth' });
        }

        function showUploadModal() {
            document.getElementById('uploadModal').style.display = 'block';
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
            document.getElementById('uploadForm').reset();
        }

        async function uploadNotes() {
            const classId = document.getElementById('classSelect').value;
            const divisionId = document.getElementById('divisionSelect').value;
            const title = document.getElementById('titleInput').value;
            const subject = document.getElementById('subjectInput').value;
            const description = document.getElementById('descriptionInput').value;
            const fileInput = document.getElementById('fileInput');
            
            if (!classId || !divisionId || !title || !subject || !description || !fileInput.files[0]) {
                showToast('Please fill all fields and select a file', 'warning');
                return;
            }
            
            try {
                showLoading();
                const formData = new FormData();
                formData.append('title', title);
                formData.append('subject', subject);
                formData.append('description', description);
                formData.append('classId', classId);
                formData.append('divisionId', divisionId);
                formData.append('file', fileInput.files[0]);
                formData.append('teacherId', currentTeacherId);
                
                const response = await fetch('http://localhost:8082/api/notes/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('Failed to upload notes');
                
                showToast('Notes uploaded successfully!', 'success');
                closeUploadModal();
                loadNotes(); // Refresh notes
                
            } catch (error) {
                console.error('Error uploading notes:', error);
                showToast('Error uploading notes', 'error');
            } finally {
                hideLoading();
            }
        }

        async function deleteNote(noteId) {
            if (!confirm('Are you sure you want to delete this note?')) {
                return;
            }
            
            try {
                showLoading();
                const response = await fetch(`http://localhost:8082/api/notes/${noteId}?teacherId=${currentTeacherId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('Failed to delete note');
                
                showToast('Note deleted successfully!', 'success');
                loadNotes(); // Refresh notes
                
            } catch (error) {
                console.error('Error deleting note:', error);
                showToast('Error deleting note', 'error');
            } finally {
                hideLoading();
            }
        }

        function downloadNote(filePath, fileName) {
            const link = document.createElement('a');
            link.href = `http://localhost:8082/api/files/download/${filePath}`;
            link.download = fileName;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast('Download started', 'success');
        }

        function refreshNotes() {
            loadNotes();
            showToast('Notes refreshed', 'success');
        }

        function renderErrorState() {
            const tbody = document.getElementById('notesTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="text-center text-danger">
                        <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                        <p>Error loading notes. Please try again.</p>
                        <button class="btn btn-outline" onclick="loadNotes()">
                            <i class="fas fa-retry"></i>
                            Retry
                        </button>
                    </td>
                </tr>
            `;
        }

        // Utility functions
        function getFileIcon(fileType) {
            const icons = {
                'pdf': 'pdf',
                'doc': 'word',
                'docx': 'word',
                'ppt': 'powerpoint',
                'pptx': 'powerpoint',
                'jpg': 'image',
                'jpeg': 'image',
                'png': 'image'
            };
            return icons[fileType?.toLowerCase()] || 'alt';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function showLoading() {
            // Show loading state
        }

        function hideLoading() {
            // Hide loading state
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <div class="toast-content">
                    <i class="fas fa-${getToastIcon(type)}"></i>
                    <span>${message}</span>
                </div>
                <button class="toast-close" onclick="this.parentElement.remove()">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            document.getElementById('toastContainer').appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 5000);
        }

        function getToastIcon(type) {
            const icons = {
                success: 'check-circle',
                error: 'exclamation-circle',
                warning: 'exclamation-triangle',
                info: 'info-circle'
            };
            return icons[type] || 'info-circle';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString();
        }
    </script>
</body>
</html>
