<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Divisions - SmartTutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/modal.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>
    
    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Manage Divisions</h1>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <button class="btn btn-primary" id="addDivisionBtn">
                        <i class="fas fa-plus"></i>
                        Add Division
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <section class="content">
            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label for="searchInput">Search</label>
                    <input type="text" id="searchInput" class="filter-control" placeholder="Search by division name...">
                </div>
                <div class="filter-group">
                    <label for="classFilter">Class</label>
                    <select id="classFilter" class="filter-control form-select">
                        <option value="">All Classes</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="window.divisionsApp.applyFilters()">
                    <i class="fas fa-filter"></i> Apply Filters
                </button>
                <button class="btn btn-outline" onclick="window.divisionsApp.resetFilters()">
                    <i class="fas fa-times"></i> Reset
                </button>
            </div>

            <!-- Table Container -->
            <div class="table-container">
                <div class="table-header">
                    <h2 class="table-title">Divisions</h2>
                    <div class="table-actions">
                        <button class="btn btn-primary" onclick="window.divisionsApp.showCreateModal()">
                            <i class="fas fa-plus"></i> Add Division
                        </button>
                        <button class="btn btn-outline" onclick="window.divisionsApp.refreshData()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>

                <!-- Skeleton Loader -->
                <div class="skeleton-loader" id="skeletonLoader">
                    <div class="skeleton-row">
                        <div class="skeleton-cell"></div>
                        <div class="skeleton-cell"></div>
                        <div class="skeleton-cell"></div>
                        <div class="skeleton-cell"></div>
                    </div>
                    <div class="skeleton-row">
                        <div class="skeleton-cell"></div>
                        <div class="skeleton-cell"></div>
                        <div class="skeleton-cell"></div>
                        <div class="skeleton-cell"></div>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="table-wrapper" id="tableWrapper" style="display: none;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Division Name</th>
                                <th>Class</th>
                                <th>Student Count</th>
                                <th>Created Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="divisionsTableBody">
                            <!-- Rows will be inserted here -->
                        </tbody>
                    </table>

                    <!-- Empty State -->
                    <div class="empty-state" id="emptyState" style="display: none;">
                        <div class="empty-icon">
                            <i class="fas fa-object-group"></i>
                        </div>
                        <h3 class="empty-title">No Divisions Found</h3>
                        <p class="empty-subtitle">Try adjusting your filters or add a new division to get started.</p>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <div class="pagination-left">
                        <span id="paginationInfo">Showing 0 of 0 divisions</span>
                    </div>
                    <div class="pagination-right">
                        <button class="pagination-btn" id="prevPageBtn" onclick="window.divisionsApp.prevPage()" disabled>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="page-info" id="pageInfo">Page 1 of 1</span>
                        <button class="pagination-btn" id="nextPageBtn" onclick="window.divisionsApp.nextPage()" disabled>
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- Modal Container -->
    <div id="modalContainer"></div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/modal.js"></script>
    <script src="../js/auth-utils.js"></script>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/logout-helper.js"></script>
    <script src="../js/divisions.js"></script>
    
    <script>
        // Auth check
        if (!isAuthenticated() || !hasRole('HOD')) {
            window.location.href = '../index.html';
        }

        // Loading functions
        function showLoading() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.classList.remove('hidden');
            }
        }

        function hideLoading() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.classList.add('hidden');
            }
        }

        // Initialize page with sidebar
        document.addEventListener('DOMContentLoaded', function() {
            if (window.loadSidebar) window.loadSidebar();
            // Wire up header Add Division button
            const addBtn = document.getElementById('addDivisionBtn');
            if (addBtn) addBtn.addEventListener('click', () => window.divisionsApp?.showCreateModal());
        });
    </script>
</body>
</html>
