<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SmartTutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-key"></i>
                    <h1>Reset Password</h1>
                </div>
                <p class="tagline" id="stepDescription">Enter your email to receive OTP</p>
            </div>
            
            <!-- Step 1: Email -->
            <form id="emailForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" required placeholder="Enter your registered email">
                    <span class="error-message" id="emailError"></span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="sendOtpBtn">
                    <i class="fas fa-paper-plane"></i>
                    <span>Send OTP</span>
                </button>
            </form>
            
            <!-- Step 2: OTP Verification -->
            <form id="otpForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label for="otp">
                        <i class="fas fa-shield-alt"></i>
                        OTP Code
                    </label>
                    <input type="text" id="otp" name="otp" required placeholder="Enter 6-digit OTP" maxlength="6" pattern="\d{6}">
                    <span class="error-message" id="otpError"></span>
                    <p style="font-size: 0.85rem; color: var(--gray-color); margin-top: 0.5rem;">
                        OTP sent to <strong id="emailDisplay"></strong>
                    </p>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="verifyOtpBtn">
                    <i class="fas fa-check-circle"></i>
                    <span>Verify OTP</span>
                </button>
            </form>
            
            <!-- Step 3: New Password -->
            <form id="passwordForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label for="newPassword">
                        <i class="fas fa-lock"></i>
                        New Password
                    </label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="newPassword" name="newPassword" required placeholder="Enter new password" style="padding-right: 3rem;">
                        <i class="fas fa-eye toggle-password" onclick="togglePasswordField('newPassword')" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray-color);"></i>
                    </div>
                    <span class="error-message" id="newPasswordError"></span>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password" style="padding-right: 3rem;">
                        <i class="fas fa-eye toggle-password" onclick="togglePasswordField('confirmPassword')" style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray-color);"></i>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full" id="resetPasswordBtn">
                    <i class="fas fa-save"></i>
                    <span>Reset Password</span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>
                    <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </p>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <!-- Scripts -->
    <script src="js/toast-system.js"></script>
    <script>
        let userEmail = '';
        let userOtp = '';
        
        function togglePasswordField(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
        
        function showLoading() {
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
        
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
        }
        
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            if (errorElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }
        }
        
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        
        // Step 1: Send OTP
        document.getElementById('emailForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();
            
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                showError('emailError', 'Email is required');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError('emailError', 'Invalid email format');
                return;
            }
            
            const btn = document.getElementById('sendOtpBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending OTP...';
            
            try {
                const response = await fetch('http://localhost:8082/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to send OTP');
                }
                
                userEmail = email;
                document.getElementById('emailDisplay').textContent = email;
                document.getElementById('stepDescription').textContent = 'Verify OTP sent to your email';
                document.getElementById('emailForm').style.display = 'none';
                document.getElementById('otpForm').style.display = 'block';
                
                if (window.showSuccess) {
                    showSuccess('OTP sent successfully! Check your email.');
                }
                
            } catch (error) {
                if (window.showError) {
                    showError(error.message);
                }
                showError('emailError', error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });
        
        // Step 2: Verify OTP
        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();
            
            const otp = document.getElementById('otp').value.trim();
            
            if (!otp) {
                showError('otpError', 'OTP is required');
                return;
            }
            
            if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
                showError('otpError', 'OTP must be 6 digits');
                return;
            }
            
            userOtp = otp;
            document.getElementById('stepDescription').textContent = 'Create your new password';
            document.getElementById('otpForm').style.display = 'none';
            document.getElementById('passwordForm').style.display = 'block';
            
            if (window.showSuccess) {
                showSuccess('OTP verified! Now set your new password.');
            }
        });
        
        // Step 3: Reset Password
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();
            
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            
            let isValid = true;
            
            if (!newPassword) {
                showError('newPasswordError', 'New password is required');
                isValid = false;
            } else if (newPassword.length < 3) {
                showError('newPasswordError', 'Password must be at least 3 characters');
                isValid = false;
            }
            
            if (!confirmPassword) {
                showError('confirmPasswordError', 'Confirm password is required');
                isValid = false;
            } else if (newPassword !== confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
                isValid = false;
            }
            
            if (!isValid) return;
            
            const btn = document.getElementById('resetPasswordBtn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting Password...';
            
            try {
                const response = await fetch('http://localhost:8082/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        otp: userOtp,
                        newPassword,
                        confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to reset password');
                }
                
                if (window.showSuccess) {
                    showSuccess('Password reset successfully! Redirecting to login...');
                }
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                if (window.showError) {
                    showError(error.message);
                }
                showError('confirmPasswordError', error.message);
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });
    </script>
</body>
</html>
