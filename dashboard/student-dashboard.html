<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - SmartTutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>
    
    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Student Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <button class="btn btn-outline btn-sm" onclick="refreshDashboard()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="viewNotifications()">
                        <i class="fas fa-bell"></i>
                        Notifications
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Stats Cards -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon bg-success">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="attendancePercentage">0%</h3>
                            <p class="stat-label">Attendance %</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon bg-primary">
                            <i class="fas fa-tasks"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="quizProgress">0</h3>
                            <p class="stat-label">Quiz Progress</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon bg-secondary">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="latestScore">0</h3>
                            <p class="stat-label">Latest Score</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon bg-warning">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="availableNotes">0</h3>
                            <p class="stat-label">Available Notes</p>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Quick Actions -->
            <section class="quick-actions-section">
                <div class="section-header">
                    <h2>Quick Actions</h2>
                </div>
                <div class="quick-actions-grid">
                    <button class="quick-action-card" onclick="navigateToNotes()">
                        <div class="action-icon">
                            <i class="fas fa-book"></i>
                        </div>
                        <h3>View Notes</h3>
                        <p>Access study materials</p>
                    </button>
                    
                    <button class="quick-action-card" onclick="navigateToQuiz()">
                        <div class="action-icon">
                            <i class="fas fa-question-circle"></i>
                        </div>
                        <h3>Take Quiz</h3>
                        <p>Test your knowledge</p>
                    </button>
                    
                    <button class="quick-action-card" onclick="navigateToResults()">
                        <div class="action-icon">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <h3>View Results</h3>
                        <p>Check your performance</p>
                    </button>
                    
                    <button class="quick-action-card" onclick="navigateToAttendance()">
                        <div class="action-icon">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <h3>My Attendance</h3>
                        <p>View attendance record</p>
                    </button>
                </div>
            </section>
            
            <!-- Recent Activities -->
            <section class="recent-activities-section">
                <div class="section-header">
                    <h2>Recent Quizzes</h2>
                </div>
                <div class="activities-list" id="recentQuizzes">
                    <!-- Quiz results will be loaded here -->
                </div>
            </section>
        </div>
    </main>
    
    <!-- Modal Container -->
    <div id="modalContainer"></div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar-loader.js"></script>
    <script>
        // Initialize Student Dashboard
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔍 STUDENT: DOM loaded - checking auth...');
            
            // Wait a moment for localStorage to be ready
            setTimeout(() => {
                const userStr = localStorage.getItem("user");
                console.log('🔍 STUDENT: User data from localStorage:', userStr);
                
                if (!userStr) {
                    console.log('❌ STUDENT: No user found - redirecting to login');
                    window.location.href = '/frontend/index.html';
                    return;
                }
                
                try {
                    const user = JSON.parse(userStr);
                    console.log('🔍 STUDENT: Parsed user:', user);
                    
                    if (!user.role || user.role !== 'STUDENT') {
                        console.log('❌ STUDENT: Invalid role - redirecting to login. Role:', user.role);
                        window.location.href = '/frontend/index.html';
                        return;
                    }
                    
                    console.log('✅ STUDENT: Auth check passed - loading dashboard');
                    
                    // Load sidebar first, then dashboard data
                    window.loadSidebar().then(() => {
                        console.log('✅ STUDENT: Sidebar loaded successfully');
                        loadDashboardData();
                    }).catch(error => {
                        console.error('❌ STUDENT: Sidebar load failed:', error);
                        // Still try to load dashboard data even if sidebar fails
                        loadDashboardData();
                    });
                    
                } catch (error) {
                    console.error('❌ STUDENT: Failed to parse user data:', error);
                    window.location.href = '/frontend/index.html';
                    return;
                }
            }, 100); // Small delay to ensure localStorage is ready
        });
        
        async function loadDashboardData() {
            try {
                showLoading();
                const response = await studentAPI.getDashboardStats();
                
                if (response) {
                    updateStatsCards(response);
                    await loadRecentQuizzes();
                }
            } catch (error) {
                console.error('Dashboard data error:', error);
                showToast('Failed to load dashboard data', 'error');
            } finally {
                hideLoading();
            }
        }
        
        function updateStatsCards(data) {
            animateNumber('attendancePercentage', data.attendancePercentage || 0);
            animateNumber('quizProgress', data.quizProgress || 0);
            animateNumber('latestScore', data.latestScore || 0);
            animateNumber('availableNotes', data.availableNotes || 0);
        }
        
        function animateNumber(elementId, targetValue) {
            const element = document.getElementById(elementId);
            const startValue = 0;
            const duration = 1000;
            const startTime = performance.now();
            
            function updateNumber(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const currentValue = Math.floor(startValue + (targetValue - startValue) * progress);
                element.textContent = currentValue.toLocaleString();
                
                if (progress < 1) {
                    requestAnimationFrame(updateNumber);
                }
            }
            
            requestAnimationFrame(updateNumber);
        }
        
        async function loadRecentQuizzes() {
            try {
                const response = await commonAPI.getQuizzes({ limit: 5 });
                
                if (response && response.length > 0) {
                    displayRecentQuizzes(response);
                }
            } catch (error) {
                console.error('Recent quizzes error:', error);
                document.getElementById('recentQuizzes').innerHTML = '<p class="no-activities">Failed to load quizzes</p>';
            }
        }
        
        function displayRecentQuizzes(quizzes) {
            const container = document.getElementById('recentQuizzes');
            
            if (quizzes.length === 0) {
                container.innerHTML = '<p class="no-activities">No quizzes available</p>';
                return;
            }
            
            container.innerHTML = quizzes.map(quiz => `
                <div class="activity-item">
                    <div class="activity-icon">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <div class="activity-content">
                        <h4>${quiz.title}</h4>
                        <p>Difficulty: ${quiz.difficulty || 'Medium'}</p>
                        <small class="activity-time">Created: ${formatDateTime(quiz.createdAt)}</small>
                    </div>
                </div>
            `).join('');
        }
        
        function refreshDashboard() {
            loadDashboardData();
            showToast('Dashboard refreshed', 'success');
        }
        
        function viewNotifications() {
            navigateToNotifications();
        }
        
        function navigateToNotes() {
            window.location.href = '../pages/notes.html';
        }
        
        function navigateToQuiz() {
            window.location.href = '../pages/quiz.html';
        }
        
        function navigateToResults() {
            window.location.href = '../pages/results.html';
        }
        
        function navigateToAttendance() {
            window.location.href = '../pages/attendance.html';
        }
        
        function navigateToNotifications() {
            window.location.href = '../pages/notifications.html';
        }
        
        function setupSidebarEvents() {
            // Mobile menu toggle
            const mobileToggle = document.getElementById('mobileMenuToggle');
            if (mobileToggle) {
                mobileToggle.addEventListener('click', () => {
                    const sidebar = document.querySelector('.sidebar');
                    sidebar.classList.toggle('active');
                });
            }
            
            // Logout
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    try {
                        await authAPI.logout();
                        sessionStorage.removeItem('user');
                        window.location.href = '/frontend/index.html';
                    } catch (error) {
                        console.error('Logout error:', error);
                        showToast('Logout failed', 'error');
                    }
                });
            }
        }
        
        function updateUserInfo(user) {
            const userName = document.getElementById('userName');
            const userRole = document.getElementById('userRole');
            
            if (userName) userName.textContent = user.name;
            if (userRole) userRole.textContent = user.role;
        }
    </script>
</body>
</html>
