<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Dashboard - SmartTutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/professional.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebarContainer"></div>
    
    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">HOD Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="header-actions">
                    <button class="btn btn-outline btn-sm" onclick="refreshDashboard()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Dashboard Content -->
        <div class="dashboard-content">
            <!-- Stats Cards -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #dbeafe; color: #1e40af;">
                            <i class="fas fa-chalkboard"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="totalClasses">0</h3>
                            <p class="stat-label">Total Classes</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #dcfce7; color: #166534;">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="totalTeachers">0</h3>
                            <p class="stat-label">Total Teachers</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #fef3c7; color: #92400e;">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="totalStudents">0</h3>
                            <p class="stat-label">Total Students</p>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon" style="background: #ede9fe; color: #5b21b6;">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <div class="stat-content">
                            <h3 class="stat-number" id="attendanceRate">0%</h3>
                            <p class="stat-label">Attendance Rate</p>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- Recent Activity -->
            <section class="recent-activity">
                <div class="card">
                    <div class="card-header">
                        <h3>Recent Activity</h3>
                    </div>
                    <div class="card-body">
                        <div id="recentActivityList">
                            <div class="empty-state">
                                <div class="empty-state-icon">
                                    <i class="fas fa-history"></i>
                                </div>
                                <div class="empty-state-title">No recent activity</div>
                                <div class="empty-state-description">
                                    Activity will appear here as users interact with the system.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/auth-utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/sidebar-loader.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/modal.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>
    <script src="../js/fcm-config.js"></script>
    <script>
        console.log('🔍 HOD-DASHBOARD: Page loading...');
        
        // Manual auth check (same as other pages)
        const userStr = localStorage.getItem('user');
        console.log('🔍 HOD-DASHBOARD: Manual auth check - userStr:', userStr);
        
        if (!userStr) {
            console.log('🔍 HOD-DASHBOARD: No user found, redirecting to login');
            window.location.href = '/frontend/index.html';
        } else {
            try {
                const user = JSON.parse(userStr);
                console.log('🔍 HOD-DASHBOARD: Parsed user:', user);
                
                if (!user.role || user.role !== 'HOD') {
                    console.log('🔍 HOD-DASHBOARD: User not HOD, redirecting. Role:', user.role);
                    window.location.href = '/frontend/index.html';
                } else {
                    console.log('🔍 HOD-DASHBOARD: Auth check PASSED for role:', user.role);
                }
            } catch (error) {
                console.log('🔍 HOD-DASHBOARD: Failed to parse user, redirecting:', error);
                window.location.href = '/frontend/index.html';
            }
        }

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔍 HOD-DASHBOARD: DOM loaded, initializing...');
            
            // Initialize Firebase for HOD
            console.log('🔥 HOD-DASHBOARD: Initializing Firebase...');
            if (typeof window.initializeFirebase === 'function') {
                const messaging = window.initializeFirebase();
                console.log('✅ HOD-DASHBOARD: Firebase initialized successfully');
                
                // Request notification permission and get token
                if (typeof window.requestNotificationPermission === 'function') {
                    setTimeout(() => {
                        window.requestNotificationPermission(messaging);
                    }, 1000);
                }
            } else {
                console.error('❌ HOD-DASHBOARD: Firebase initialization function not available');
            }
            
            // Initialize sidebar first
            if (typeof window.loadSidebar === 'function') {
                window.loadSidebar().then(() => {
                    console.log('🔍 HOD-DASHBOARD: Sidebar loaded successfully');
                    loadDashboard();
                }).catch(error => {
                    console.error('🔍 HOD-DASHBOARD: Sidebar loading failed:', error);
                    loadDashboard(); // Still load dashboard even if sidebar fails
                });
            } else {
                loadDashboard();
            }
        });

        async function loadDashboard() {
            try {
                // Load dashboard stats from actual API
                const response = await fetch('http://localhost:8082/api/hod/dashboard');
                if (!response.ok) {
                    throw new Error('Failed to load dashboard data');
                }
                const stats = await response.json();
                updateStats(stats);
                
                // Load recent activity
                const activityResponse = await fetch('http://localhost:8082/api/hod/activity-logs');
                if (activityResponse.ok) {
                    const activities = await activityResponse.json();
                    updateRecentActivity(activities.slice(0, 5)); // Show last 5 activities
                } else {
                    updateRecentActivity([]); // Empty if fails
                }
                
            } catch (error) {
                console.error('Failed to load dashboard:', error);
                showError('Failed to load dashboard data');
            }
        }

        function updateStats(stats) {
            // Animate numbers using actual API field names
            animateNumber('totalClasses', stats.totalClasses || 0);
            animateNumber('totalTeachers', stats.totalTeachers || 0);
            animateNumber('totalStudents', stats.totalStudents || 0);
            animateNumber('attendanceRate', stats.overallAttendancePercentage || 0, '%');
        }

        function animateNumber(elementId, target, suffix = '') {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            const duration = 1000;
            const start = 0;
            const increment = target / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.round(current) + suffix;
            }, 16);
        }

        function updateRecentActivity(activities) {
            const container = document.getElementById('recentActivityList');
            if (!container) return;
            
            if (!activities || activities.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        <div class="empty-state-title">No recent activity</div>
                        <div class="empty-state-description">
                            Activity will appear here as users interact with the system.
                        </div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = activities.map(activity => `
                <div class="activity-item fade-in">
                    <div class="activity-icon">
                        <i class="fas ${getActivityIcon(activity.action)}"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">${activity.description || activity.action}</div>
                        <div class="activity-time">${formatDate(activity.timestamp)}</div>
                    </div>
                </div>
            `).join('');
        }

        function getActivityIcon(action) {
            const icons = {
                'CREATE_CLASS': 'fa-chalkboard',
                'CREATE_TEACHER': 'fa-user-tie',
                'CREATE_STUDENT': 'fa-user-graduate',
                'CREATE_DIVISION': 'fa-object-group',
                'MARK_ATTENDANCE': 'fa-calendar-check',
                'UPLOAD_NOTE': 'fa-file-upload',
                'CREATE_QUIZ': 'fa-question-circle',
                'DELETE_TEACHER': 'fa-trash',
                'UPDATE_TEACHER': 'fa-edit'
            };
            return icons[action] || 'fa-circle';
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'N/A';
            const date = new Date(timestamp);
            if (isNaN(date.getTime())) return 'N/A';
            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function refreshDashboard() {
            await loadDashboard();
            showSuccess('Dashboard refreshed');
        }
    </script>
</body>
</html>
